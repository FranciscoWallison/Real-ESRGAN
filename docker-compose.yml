version: '3.8'

networks:
  esrgan-network:
    driver: bridge

services:
  app:
    build: .
    container_name: realesrgan_api
    restart: always
    tty: true
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./weights:/app/weights
    environment:
      - MODEL_NAME=RealESRGAN_x4plus
      - WEIGHTS_DIR=/app/weights
    networks:
      - esrgan-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
